name: Create global issue when scope global label is added

on:
  issues:
    types: [labeled]

jobs:
  sync-to-global:
    if: github.event.label.name == 'scope:global'
    runs-on: ubuntu-latest

    steps:
      - name: Create issue in global repo
        env:
          GH_TOKEN: ${{ secrets.GLOBAL_REPO_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_ISSUE_NUMBER: ${{ github.event.issue.number }}
          SOURCE_ISSUE_TITLE: ${{ github.event.issue.title }}
          SOURCE_ISSUE_URL: ${{ github.event.issue.html_url }}
          SOURCE_ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          gh issue create \
            -R ParentingForLifelongHealth/plh-facilitator-app-content \
            -t "[${SOURCE_REPO}#${SOURCE_ISSUE_NUMBER}] ${SOURCE_ISSUE_TITLE}" \
            -b "Source issue: ${SOURCE_ISSUE_URL}

${SOURCE_ISSUE_BODY}"
